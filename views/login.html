<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AVISENS — Iniciar Sesión</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css-login/style.css">
  <style>
    .form-control {
      width: 100%; padding: 0.875rem 1rem; margin-bottom: 1.25rem;
      background: var(--bg-primary); border: 1px solid var(--border-color);
      color: var(--text-primary); border-radius: 0.5rem; outline: none;
      transition: all 0.3s; font-family: 'Inter', sans-serif;
      box-sizing: border-box; font-size: 0.9rem;
    }
    .form-control:focus {
      border-color: var(--status-optimal);
      box-shadow: 0 0 10px rgba(16, 185, 129, 0.2);
    }
    .btn-full {
      width: 100%; justify-content: center; margin-top: 4px;
      text-decoration: none; text-align: center; cursor: pointer;
      border: none; padding: 1rem; border-radius: 0.5rem;
      font-family: 'Inter', sans-serif; font-weight: 600; font-size: 0.95rem;
    }
    /* Selector de rol */
    .role-selector {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.5rem;
      margin-bottom: 1.5rem;
    }
    .role-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.35rem;
      padding: 0.75rem 0.5rem;
      background: var(--bg-primary);
      border: 1px solid var(--border-color);
      border-radius: 0.5rem;
      cursor: pointer;
      transition: all 0.25s;
      font-family: 'Inter', sans-serif;
      color: var(--text-muted);
      font-size: 0.75rem;
      font-weight: 500;
    }
    .role-btn i {
      font-size: 1.1rem;
    }
    .role-btn:hover {
      border-color: var(--status-optimal);
      color: var(--text-primary);
    }
    .role-btn.active {
      border-color: var(--status-optimal);
      background: rgba(16, 185, 129, 0.08);
      color: var(--status-optimal);
      box-shadow: 0 0 8px rgba(16, 185, 129, 0.15);
    }
    .role-btn.active-avisens {
      border-color: var(--status-warning);
      background: rgba(245, 158, 11, 0.08);
      color: var(--status-warning);
      box-shadow: 0 0 8px rgba(245, 158, 11, 0.15);
    }
    .credentials-hint {
      font-size: 0.7rem;
      color: var(--text-muted);
      text-align: center;
      margin-bottom: 1rem;
      padding: 0.4rem 0.75rem;
      background: var(--bg-primary);
      border-radius: 0.375rem;
      border: 1px solid var(--border-color);
    }
    .error-msg {
      color: var(--status-critical);
      font-size: 0.8rem;
      text-align: center;
      margin-bottom: 0.75rem;
      display: none;
    }
  </style>
</head>
<body class="login-body">

  <div class="login-wrapper">
    <div class="login-card fade-in">
      <div class="login-header">
        <div class="brand-icon-large">🐔</div>
        <h2>AVISENS</h2>
        <p class="subtitle">Sistema de Gestión Avícola</p>
      </div>

      <!-- Selector de rol -->
      <p style="font-size:0.78rem; color:var(--text-muted); margin-bottom:0.75rem; text-align:center;">
        Selecciona tu perfil de acceso
      </p>
      <div class="role-selector" id="roleSelector">
        <button class="role-btn" id="btn-avisens" onclick="selectRole('avisens')">
          <i class="fa-solid fa-crown"></i>
          <span>Avisens</span>
        </button>
        <button class="role-btn active" id="btn-usuario" onclick="selectRole('usuario')">
          <i class="fa-solid fa-building"></i>
          <span>Usuario</span>
        </button>
        <button class="role-btn" id="btn-operario" onclick="selectRole('operario')">
          <i class="fa-solid fa-hard-hat"></i>
          <span>Operario</span>
        </button>
      </div>

      <div class="credentials-hint" id="credentialsHint">
        Demo: <strong>usuario</strong> / <strong>admin123</strong>
      </div>

      <form id="formLogin">
        <input type="text" id="usuario" class="form-control" placeholder="Usuario" required autocomplete="username">
        <input type="password" id="clave" class="form-control" placeholder="Contraseña" required autocomplete="current-password">

        <p class="error-msg" id="errorMsg">
          <i class="fa-solid fa-circle-xmark"></i> Credenciales incorrectas. Verifica e intenta de nuevo.
        </p>

        <button type="submit" class="btn-primary btn-full">
          <i class="fa-solid fa-right-to-bracket"></i> Ingresar al Sistema
        </button>
      </form>

      <p style="text-align:center; margin-top:1.25rem; font-size:0.72rem; color:var(--text-muted);">
        AVISENS &copy; 2026 · Tecnología para progresar
      </p>
    </div>
  </div>

  <script>
    // ───── Estado ─────
    let rolActivo = 'usuario';

    const credenciales = {
      avisens:  { user: 'avisens',  pass: 'admin123', path: 'avisens/dashboard.html'  },
      usuario:  { user: 'usuario',  pass: 'admin123', path: 'usuario/dashboard.html'  },
      operario: { user: 'operario', pass: 'oper123',  path: 'operario/dashboard.html' }
    };

    const hints = {
      avisens:  'Demo: <strong>avisens</strong> / <strong>admin123</strong>',
      usuario:  'Demo: <strong>usuario</strong> / <strong>admin123</strong>',
      operario: 'Demo: <strong>operario</strong> / <strong>oper123</strong>'
    };

    // ───── Seleccionar rol ─────
    window.selectRole = function(rol) {
      rolActivo = rol;
      document.querySelectorAll('.role-btn').forEach(b => b.classList.remove('active', 'active-avisens'));

      const btn = document.getElementById('btn-' + rol);
      btn.classList.add(rol === 'avisens' ? 'active-avisens' : 'active');

      document.getElementById('credentialsHint').innerHTML = hints[rol];
      document.getElementById('errorMsg').style.display = 'none';

      // Pre-fill campos demo
      document.getElementById('usuario').value = credenciales[rol].user;
      document.getElementById('clave').value = credenciales[rol].pass;
    };

    // Pre-seleccionar usuario por defecto
    selectRole('usuario');

    // ───── Login ─────
    document.getElementById('formLogin').addEventListener('submit', function(e) {
      e.preventDefault();

      const user = document.getElementById('usuario').value.trim();
      const pass = document.getElementById('clave').value.trim();
      const errorEl = document.getElementById('errorMsg');

      errorEl.style.display = 'none';

      // Buscar en los 3 roles
      let destino = null;
      for (const [rol, cred] of Object.entries(credenciales)) {
        if (user === cred.user && pass === cred.pass) {
          destino = cred.path;
          break;
        }
      }

      if (destino) {
        window.location.href = destino;
      } else {
        errorEl.style.display = 'block';
        document.getElementById('clave').value = '';
        document.getElementById('clave').focus();
      }
    });
  </script>
</body>
</html>
