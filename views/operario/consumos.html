<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consumos y Gastos - AVISENS</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="css/styles.css">
    
    <style>
        .progress-container { margin-bottom: 1.5rem; }
        .progress-header { display: flex; justify-content: space-between; font-size: 0.9rem; margin-bottom: 0.5rem; }
        .progress-bar-bg { width: 100%; height: 10px; background: var(--bg-input); border-radius: 5px; overflow: hidden; }
        .progress-fill { height: 100%; border-radius: 5px; transition: width 0.5s ease, background-color 0.5s ease; }
        .fill-normal { background-color: var(--status-optimal); }
        .fill-warning { background-color: var(--status-warning); }
        .fill-critical { background-color: var(--status-critical); }
        .input-group { display: flex; gap: 0.5rem; }
        .input-group .form-control { width: auto; flex: 1; }
        .input-group select { width: 100px; }
        
        /* Estilo para las notificaciones */
        .alerta-mensaje {
            padding: 1rem; border-radius: 0.5rem; margin-top: 1rem; display: none; font-weight: 500; text-align: center;
        }
        .alerta-exito { background: rgba(34, 197, 94, 0.1); border: 1px solid var(--status-optimal); color: var(--status-optimal); }
        .alerta-error { background: rgba(239, 68, 68, 0.1); border: 1px solid var(--status-critical); color: var(--status-critical); }
    </style>
</head>
<body>
    <div class="app-container">
        
        <aside class="sidebar">
            <div class="brand">
                <div class="brand-icon" style="color: var(--brand-green);"><i class="fa-solid fa-kiwi-bird"></i></div>
                <div class="brand-name">Avisens</div>
            </div>
            <ul class="side-nav">
                <li><a href="dashboard.html" class="nav-item"><i class="fa-solid fa-table-columns"></i><span>Dashboard</span></a></li>
                <li><a href="novedades.html" class="nav-item"><i class="fa-solid fa-skull-crossbones"></i><span>Mortalidad</span></a></li>
                <li><a href="consumos.html" class="nav-item active"><i class="fa-solid fa-wheat-awn"></i><span>Consumos</span></a></li>
                <li><a href="#" class="nav-item"><i class="fa-solid fa-clipboard-list"></i><span>Mis Tareas</span></a></li>
            </ul>
        </aside>

        <nav class="bottom-nav">
            <a href="dashboard.html" class="bottom-nav-item"><i class="fa-solid fa-table-columns"></i><span>Inicio</span></a>
            <a href="novedades.html" class="bottom-nav-item"><i class="fa-solid fa-skull-crossbones"></i><span>Mortalidad</span></a>
            <a href="consumos.html" class="bottom-nav-item active"><i class="fa-solid fa-wheat-awn"></i><span>Consumos</span></a>
            <a href="../login.html" class="bottom-nav-item"><i class="fa-solid fa-right-from-bracket"></i><span>Salir</span></a>
        </nav>

        <div class="main-wrapper">
            <header class="top-header">
                <div class="header-titles">
                    <h2>Consumo Diarios</h2>
                    <span class="subtitle">Control de inventario</span>
                </div>
                <div style="display: flex; align-items: center; gap: 1rem;">
                    <div style="text-align: right; display: none; @media(min-width: 768px){ display: block; }">
                        <div style="font-weight: 600; font-size: 0.9rem;">Carlos Operario</div>
                        <div style="color: var(--text-secondary); font-size: 0.75rem;">Galpones 1 y 2</div>
                    </div>
                    <div style="width: 40px; height: 40px; background: var(--brand-green); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold;">CO</div>
                </div>
            </header>

            <main class="content-area">
                <div class="section-block fade-in">
                    <h3 class="section-title">Consumo Acumulado (Semana 3)</h3>
                    
                    <div class="progress-container">
                        <div class="progress-header">
                            <span><i class="fa-solid fa-wheat-awn"></i> Alimento Bultos</span>
                            <span id="textoAlimento">300 / 500 Kg (60%)</span>
                        </div>
                        <div class="progress-bar-bg">
                            <div id="barraAlimento" class="progress-fill fill-normal" style="width: 60%;"></div>
                        </div>
                    </div>

                    <div class="progress-container">
                        <div class="progress-header">
                            <span><i class="fa-solid fa-syringe"></i> Medicinas / Vacunas</span>
                            <span>2 / 10 Dosis (20%)</span>
                        </div>
                        <div class="progress-bar-bg">
                            <div class="progress-fill fill-normal" style="width: 20%;"></div>
                        </div>
                    </div>
                </div>

                <div class="section-block fade-in" style="margin-top: 2rem;">
                    <h3 class="section-title">Registrar Gasto</h3>
                    <form id="formConsumo">
                        <div class="form-group" style="margin-bottom: 1.5rem;">
                            <label>Tipo de Insumo</label>
                            <select id="tipoInsumo" class="form-control">
                                <option value="Alimento Iniciación">Alimento Iniciación</option>
                                <option value="Alimento Engorde">Alimento Engorde</option>
                                <option value="Medicinas">Vitaminas en Agua</option>
                                <option value="Otros">Cascarilla / Cama</option>
                            </select>
                        </div>
                        <div class="form-group" style="margin-bottom: 1.5rem;">
                            <label>Cantidad Utilizada</label>
                            <div class="input-group">
                                <input type="number" id="cantidadInsumo" class="form-control" placeholder="Ej: 50" required min="1">
                                <select class="form-control">
                                    <option>Kg</option>
                                    <option>Bultos</option>
                                    <option>Litros</option>
                                </select>
                            </div>
                        </div>
                        <button type="submit" class="btn-primary" style="width: 100%; padding: 1rem; font-size: 1.1rem;">
                            <i class="fa-solid fa-plus"></i> Añadir Consumo
                        </button>

                        <div id="mensajeNotificacion" class="alerta-mensaje"></div>
                    </form>
                </div>
            </main>
        </div>
    </div>

    <script src="js/consumos.js"></script>
</body>
</html>
