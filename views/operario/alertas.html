<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Avisens | Alertas — Operario</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app-container">

      <!-- ===== SIDEBAR ===== -->
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-icon"><img src="img/logo.png" alt="Avisens logo" onerror="this.outerHTML='🐔'"></div>
          <h1 class="brand-name">Avisens</h1>
        </div>
        <nav class="side-nav">
          <a href="dashboard.html" class="nav-item">
            <i class="fa-solid fa-house"></i> Mi Panel
          </a>
          <a href="alertas.html" class="nav-item active">
            <i class="fa-solid fa-bell"></i> Alertas
          </a>
          <a href="control.html" class="nav-item">
            <i class="fa-solid fa-sliders"></i> Control Manual
          </a>
        </nav>
      </aside>

      <!-- ===== MAIN CONTENT ===== -->
      <div class="main-wrapper">

        <header class="top-header">
          <div class="header-titles">
            <h2>Alertas</h2>
            <p class="subtitle">Alertas activas en tus galpones asignados</p>
          </div>
          <div class="header-right">
            <div class="user-profile">
              <div class="user-info">
                <span class="user-name">Carlos Ruiz</span>
                <span class="user-role">Operario</span>
              </div>
              <div class="user-avatar"><i class="fa-solid fa-hard-hat"></i></div>
            </div>
            <button class="btn-logout" onclick="cerrarSesion()">
              <i class="fa-solid fa-right-from-bracket"></i> Salir
            </button>
          </div>
        </header>

        <main class="content-area">

          <!-- RESUMEN -->
          <section class="section-block fade-in">
            <div class="alerts-summary-grid">
              <div class="summary-card critical-summary" onclick="filtrarPor('critical')">
                <div class="summary-icon">
                  <i class="fa-solid fa-circle-xmark"></i>
                </div>
                <div class="summary-data">
                  <h3 id="count-critical">0</h3>
                  <span>Críticas</span>
                </div>
              </div>
              <div class="summary-card warning-summary" onclick="filtrarPor('warning')">
                <div class="summary-icon">
                  <i class="fa-solid fa-triangle-exclamation"></i>
                </div>
                <div class="summary-data">
                  <h3 id="count-warning">0</h3>
                  <span>Advertencias</span>
                </div>
              </div>
              <div class="summary-card optimal-summary" onclick="filtrarPor('all')">
                <div class="summary-icon">
                  <i class="fa-solid fa-circle-check"></i>
                </div>
                <div class="summary-data">
                  <h3 id="count-resolved">0</h3>
                  <span>Resueltas hoy</span>
                </div>
              </div>
            </div>
          </section>

          <!-- FILTROS -->
          <section class="section-block fade-in" style="animation-delay: 0.05s">
            <div style="display:flex; gap:0.5rem; flex-wrap:wrap; margin-bottom:1.5rem;">
              <button class="filter-chip active" id="chip-all" onclick="filtrarPor('all')">
                <i class="fa-solid fa-list"></i> Todas
              </button>
              <button class="filter-chip chip-critical" id="chip-critical" onclick="filtrarPor('critical')">
                <i class="fa-solid fa-circle-xmark"></i> Críticas
              </button>
              <button class="filter-chip chip-warning" id="chip-warning" onclick="filtrarPor('warning')">
                <i class="fa-solid fa-triangle-exclamation"></i> Advertencias
              </button>
              <button class="filter-chip" id="chip-resolved" onclick="filtrarPor('resolved')">
                <i class="fa-solid fa-circle-check"></i> Resueltas
              </button>
            </div>

            <!-- LISTA DE ALERTAS -->
            <div class="detailed-alerts-list" id="alertsList"></div>
          </section>

        </main>
      </div>

      <!-- BOTTOM NAV (Mobile) -->
      <nav class="bottom-nav">
        <a href="dashboard.html" class="bottom-nav-item">
          <i class="fa-solid fa-house"></i>
          <span>Panel</span>
        </a>
        <a href="alertas.html" class="bottom-nav-item active">
          <i class="fa-solid fa-bell"></i>
          <span>Alertas</span>
        </a>
        <a href="control.html" class="bottom-nav-item">
          <i class="fa-solid fa-sliders"></i>
          <span>Control</span>
        </a>
      </nav>
    </div>

    <script src="utils.js"></script>
    <script>
      // ===== DATOS DE ALERTAS =====
      const alertasData = [
        {
          id: 1,
          status: 'warning',
          resolved: false,
          galpon: 'Galpón 2',
          titulo: 'Temperatura en advertencia',
          desc: 'Temperatura actual <strong>26°C</strong> — supera el umbral óptimo de 24°C. Se recomienda revisar la ventilación.',
          sensor: 'Temperatura',
          valor: '26°C',
          hace: 30,
        },
        {
          id: 2,
          status: 'warning',
          resolved: false,
          galpon: 'Galpón 2',
          titulo: 'CO₂ elevado',
          desc: 'Concentración de CO₂: <strong>2,800 ppm</strong> — por encima del rango recomendado. Aumentar ventilación.',
          sensor: 'CO₂',
          valor: '2,800 ppm',
          hace: 45,
        },
        {
          id: 3,
          status: 'warning',
          resolved: false,
          galpon: 'Galpón 2',
          titulo: 'Amoníaco en límite',
          desc: 'NH₃ en <strong>22 ppm</strong> — próximo al umbral de advertencia (20 ppm). Supervisar cama y ventilación.',
          sensor: 'Amoníaco',
          valor: '22 ppm',
          hace: 50,
        },
        {
          id: 4,
          status: 'warning',
          resolved: true,
          galpon: 'Galpón 1',
          titulo: 'Humedad baja — RESUELTA',
          desc: 'Humedad cayó a <strong>58%</strong>. Se activó nebulizador automáticamente. Ahora en 65%.',
          sensor: 'Humedad',
          valor: '58% → 65%',
          hace: 120,
        },
      ];

      let filtroActual = 'all';

      function renderAlertas() {
        const lista = document.getElementById('alertsList');
        const filtradas = alertasData.filter(a => {
          if (filtroActual === 'all') return !a.resolved;
          if (filtroActual === 'resolved') return a.resolved;
          return a.status === filtroActual && !a.resolved;
        });

        // Contadores
        document.getElementById('count-critical').textContent = alertasData.filter(a => a.status === 'critical' && !a.resolved).length;
        document.getElementById('count-warning').textContent = alertasData.filter(a => a.status === 'warning' && !a.resolved).length;
        document.getElementById('count-resolved').textContent = alertasData.filter(a => a.resolved).length;

        if (filtradas.length === 0) {
          lista.innerHTML = `
            <div style="text-align:center; padding:3rem 1rem; color:var(--text-muted);">
              <i class="fa-solid fa-circle-check" style="font-size:2.5rem; color:var(--status-optimal); margin-bottom:1rem; display:block;"></i>
              <p style="font-size:0.9rem;">Sin alertas en este filtro</p>
            </div>`;
          return;
        }

        lista.innerHTML = filtradas.map(a => `
          <div class="detailed-alert-card ${a.resolved ? 'resolved' : 'unread'}" data-status="${a.status}" id="alert-${a.id}">
            <div class="alert-icon-large">
              <i class="fa-solid ${a.resolved ? 'fa-circle-check' : a.status === 'critical' ? 'fa-circle-xmark' : 'fa-triangle-exclamation'}"></i>
            </div>
            <div class="alert-info">
              <div class="alert-header">
                <h4>${a.titulo}</h4>
                <span class="time-badge">${formatTimeAgo(a.hace)}</span>
              </div>
              <p class="alert-desc">${a.desc}</p>
              <div class="alert-meta">
                <span class="alert-meta-item"><i class="fa-solid fa-warehouse"></i> ${a.galpon}</span>
                <span class="alert-meta-item"><i class="fa-solid fa-gauge"></i> ${a.sensor}: ${a.valor}</span>
              </div>
              ${!a.resolved ? `
              <div class="alert-actions">
                <button class="btn-action resolve-action" onclick="resolverAlerta(${a.id})">
                  <i class="fa-solid fa-check"></i> Marcar como atendida
                </button>
                <button class="btn-action primary-action" onclick="irAControl()">
                  <i class="fa-solid fa-sliders"></i> Ir a Control
                </button>
              </div>` : `
              <div class="alert-actions">
                <span style="font-size:0.78rem; color:var(--status-optimal);"><i class="fa-solid fa-circle-check"></i> Resuelta</span>
              </div>`}
            </div>
          </div>
        `).join('');
      }

      window.filtrarPor = function(tipo) {
        filtroActual = tipo;
        document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
        const chip = document.getElementById('chip-' + tipo);
        if (chip) chip.classList.add('active');
        renderAlertas();
      };

      window.resolverAlerta = function(id) {
        const alerta = alertasData.find(a => a.id === id);
        if (!alerta) return;
        showConfirm(
          'Confirmar Atención',
          `¿Confirmas que atendiste la alerta "<strong>${alerta.titulo}</strong>" en ${alerta.galpon}?`,
          () => {
            alerta.resolved = true;
            renderAlertas();
            showToast('success', 'Alerta atendida', `"${alerta.titulo}" registrada como resuelta.`);
          }
        );
      };

      window.irAControl = function() {
        window.location.href = 'control.html';
      };

      // Inicializar
      renderAlertas();
    </script>
  </body>
</html>
