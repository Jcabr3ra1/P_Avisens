<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Súper Administrador - Avisens</title>
    <style>
        /* Estilos temporales integrados para la visualización */
        :root { --primary-green: #2ecc71; --hover-green: #27ae60; --sidebar-green: #2a3f54; }
        body { margin: 0; font-family: sans-serif; display: flex; height: 100vh; }

        /* HEADER */
        header { position: fixed; top: 0; left: 0; right: 0; height: 60px; background: white; border-bottom: 1px solid #ddd; z-index: 100; display: flex; align-items: center; justify-content: flex-end; padding: 0 20px; }
        .user-info { display: flex; align-items: center; gap: 10px; }
        .user-avatar { width: 30px; height: 30px; background: #ddd; border-radius: 50%; }

        /* SIDEBAR */
        nav { width: 250px; background-color: var(--sidebar-green); color: white; display: flex; flex-direction: column; padding-top: 60px; position: fixed; top: 0; bottom: 0; left: 0; }
        nav h2 { text-align: center; color: white; font-size: 1.2rem; }
        nav ul { list-style: none; padding: 0; }
        nav ul li a { display: block; padding: 15px 20px; color: rgba(255,255,255,0.7); text-decoration: none; border-bottom: 1px solid rgba(255,255,255,0.1); }
        nav ul li a:hover, nav ul li a.active { background-color: rgba(255,255,255,0.1); color: white; }

        /* CONTENIDO PRINCIPAL */
        main { margin-left: 250px; margin-top: 60px; flex: 1; padding: 20px; background-color: #f4f7f6; overflow-y: auto; }
        .content-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid #ddd; padding-bottom: 10px; }
        .content-header h1 { margin: 0; font-size: 1.5rem; }

        /* BOTONES GENÉRICOS DE TU DISEÑO */
        .btn { padding: 10px 15px; border: none; border-radius: 4px; cursor: pointer; text-decoration: none; display: inline-block; font-size: 0.9rem; }
        .btn-green { background-color: var(--primary-green); color: white; }
        .btn-green:hover { background-color: var(--hover-green); }
        .btn-red { background-color: #e74c3c; color: white; }
        .btn-red:hover { background-color: #c0392b; }
        .btn-gray { background-color: #95a5a6; color: white; }
        .btn-gray:hover { background-color: #7f8c8d; }
    </style>
</head>
<body>

    <nav>
        <h2>Súper Administrador Avisens</h2>
        <ul>
            <li><a href="clientes.html" class="active"> Gestor de Clientes</a></li>
            <li><a href="sensores.html">📡 Gestor de Sensores</a></li>
            <li><a href="#">⚙️ Configuración</a></li>
        </ul>
    </nav>

    <header>
        <div class="user-info">
            <span class="user-name">Usuario logueado</span>
            <div class="user-avatar"></div>
        </div>
    </header>

    <main>
        <div class="content-header">
            <h1>Cargando contenido...</h1>
        </div>
    </main>

</body>
</html>
